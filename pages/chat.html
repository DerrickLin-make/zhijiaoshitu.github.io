<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太白智能体 - 智教诗途</title>
    <meta name="description" content="与太白AI智能体对话，获得个性化的朗读指导和文学知识解析。">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .chat-layout {
            display: flex;
            height: calc(100vh - 80px);
            margin-top: 80px;
        }

        /* --- Sidebar --- */
        .chat-sidebar {
            width: 300px;
            flex-shrink: 0;
            background: var(--color-dark);
            border-right: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            padding: 40px 28px;
            gap: 32px;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sidebar-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-electric), #0080ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--color-black);
            flex-shrink: 0;
        }

        .sidebar-name {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.03em;
        }

        .sidebar-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--color-success);
            margin-top: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--color-success);
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .sidebar-section-title {
            font-family: var(--font-sans);
            font-size: 0.6rem;
            letter-spacing: var(--tracking-widest);
            text-transform: uppercase;
            color: var(--color-text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .capability-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .capability-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .capability-icon {
            font-size: 0.9rem;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }

        /* --- Chat Main Area --- */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--color-black);
            position: relative;
            overflow: hidden;
        }

        .chat-main iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: var(--color-black);
        }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .chat-sidebar {
                display: none;
            }
            .chat-layout {
                margin-top: 70px;
                height: calc(100vh - 70px);
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar scrolled" id="navbar" style="mix-blend-mode:normal; background:rgba(3,3,3,0.95); border-bottom:1px solid var(--color-border);">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="../index.html">智教诗途<span class="brand-dot">.</span></a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="materials.html" class="nav-link">资料库</a>
                <a href="chat.html" class="nav-link active">智能助手</a>
                <a href="analysis.html" class="nav-link">朗读分析</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="document.getElementById('navMenu').classList.toggle('open')">
                <span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- 聊天布局 -->
    <div class="chat-layout">
        <!-- 侧边栏 -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-avatar">李</div>
                <div>
                    <div class="sidebar-name">太白智能体</div>
                    <div class="sidebar-status">
                        <span class="status-dot"></span> 在线
                    </div>
                </div>
            </div>

            <div>
                <div class="sidebar-section-title">Capabilities</div>
                <ul class="capability-list">
                    <li class="capability-item"><span class="capability-icon">📚</span> 推荐适合的朗读材料</li>
                    <li class="capability-item"><span class="capability-icon">🎭</span> 指导朗读技巧和方法</li>
                    <li class="capability-item"><span class="capability-icon">📖</span> 解析诗词文学内容</li>
                    <li class="capability-item"><span class="capability-icon">💡</span> 提供个性化学习建议</li>
                </ul>
            </div>

            <div style="margin-top:auto; padding-top:24px; border-top:1px solid var(--color-border);">
                <p style="font-size:0.7rem; color:var(--color-text-muted); line-height:1.8;">
                    Powered by advanced language model. 对话内容仅供学习参考。
                </p>
            </div>
        </aside>

        <!-- 聊天主区域 (Dify iframe) -->
        <div class="chat-main">
            <iframe
                src="https://udify.app/chatbot/GKi5Ug3tl6r9rhen"
                allow="microphone"
                style="min-height:500px;">
            </iframe>
        </div>
    </div>

</body>
</html>
