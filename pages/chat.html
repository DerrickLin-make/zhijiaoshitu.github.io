<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>智能助手 | 智教诗途</title>
    <meta name="description" content="与太白智能体对话，获取课堂灵感、朗读建议与文本赏析。">
    <link rel="stylesheet" href="../css/main.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .chat-layout {
            display: grid;
            grid-template-columns: 0.92fr 1.08fr;
            gap: 28px;
            min-height: calc(100vh - 240px);
        }

        .assistant-info,
        .assistant-panel {
            border: 1px solid var(--line);
            border-radius: 30px;
            box-shadow: var(--shadow-md);
        }

        .assistant-info {
            background: rgba(255, 253, 249, 0.86);
            padding: 28px;
        }

        .assistant-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .assistant-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 1.35rem;
            color: #fffdf9;
            background: linear-gradient(135deg, var(--tea-deep), var(--tea));
        }

        .assistant-name {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 500;
        }

        .assistant-status {
            font-size: 0.9rem;
            color: var(--celadon-deep);
        }

        .assistant-title {
            margin: 10px 0 0;
            font-family: var(--font-serif);
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.45;
            font-weight: 500;
        }

        .assistant-copy {
            margin-top: 18px;
            color: #6f6256;
            font-size: 0.95rem;
            line-height: 2;
        }

        .capability-list {
            display: grid;
            gap: 14px;
            margin-top: 28px;
        }

        .capability-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            background: #f8f3ec;
            color: #6f6256;
            font-size: 0.92rem;
        }

        .capability-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--celadon);
            box-shadow: 0 0 14px rgba(169, 184, 165, 0.35);
        }

        .assistant-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(248, 242, 233, 0.88));
        }

        .dify-chat-root,
        .chat-panel {
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
        }

        .chat-panel__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 22px 24px 18px;
            border-bottom: 1px solid rgba(232, 222, 210, 0.7);
        }

        .chat-panel__eyebrow {
            font-size: 11px;
            letter-spacing: 0.28em;
            color: var(--text-mute);
        }

        .chat-panel__title {
            margin: 0;
            margin-top: 6px;
            font-family: var(--font-serif);
            font-size: 1.65rem;
            font-weight: 500;
        }

        .chat-panel__desc {
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-mute);
        }

        .chat-panel__reset {
            border: 1px solid #d7c7b7;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.82);
            color: #6f6256;
            padding: 10px 16px;
            font-size: 13px;
            transition: border-color var(--transition), color var(--transition), transform var(--transition);
        }

        .chat-panel__reset:hover {
            border-color: var(--tea);
            color: var(--tea-deep);
            transform: translateY(-1px);
        }

        .chat-panel__messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 24px;
            background:
                radial-gradient(circle at top right, rgba(175, 192, 200, 0.1), transparent 22%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(250, 247, 241, 0.38));
        }

        .chat-system-message {
            align-self: center;
            max-width: min(100%, 520px);
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(245, 239, 230, 0.84);
            color: var(--text-soft);
            font-size: 13px;
            text-align: center;
        }

        .chat-system-message--error {
            background: rgba(191, 122, 78, 0.12);
            color: #8a5a39;
        }

        .chat-message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: min(84%, 680px);
        }

        .chat-message--user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .chat-message--assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        .chat-message__meta {
            font-size: 12px;
            color: var(--text-mute);
        }

        .chat-message__body {
            margin: 0;
            padding: 14px 16px;
            border-radius: 20px;
            line-height: 1.9;
            font-size: 14px;
            color: #5f5348;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(232, 222, 210, 0.82);
            box-shadow: 0 10px 26px rgba(110, 88, 62, 0.05);
        }

        .chat-message--user .chat-message__body {
            color: #fffdf9;
            background: linear-gradient(135deg, var(--tea-deep), #a18463);
            border-color: transparent;
            box-shadow: 0 12px 24px rgba(142, 115, 86, 0.16);
        }

        .chat-message__body--muted {
            color: var(--text-soft);
        }

        .chat-panel__composer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            padding: 18px 20px 20px;
            border-top: 1px solid rgba(232, 222, 210, 0.72);
            background: rgba(255, 253, 249, 0.88);
        }

        .chat-panel__composer textarea {
            width: 100%;
            min-height: 56px;
            max-height: 180px;
            resize: none;
            border: 1px solid #ddd1c5;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            padding: 16px 18px;
            outline: none;
            line-height: 1.7;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transition: border-color var(--transition), box-shadow var(--transition);
            overflow-y: hidden;
        }

        .chat-panel__composer textarea:focus {
            border-color: rgba(142, 115, 86, 0.45);
            box-shadow: 0 0 0 4px rgba(183, 157, 125, 0.12);
        }

        .chat-panel__composer button {
            align-self: end;
            height: 56px;
            padding: 0 22px;
            border-radius: 18px;
            background: var(--tea-deep);
            color: #fffdf9;
            box-shadow: 0 14px 24px rgba(142, 115, 86, 0.16);
            transition: background-color var(--transition), transform var(--transition), opacity var(--transition);
        }

        .chat-panel__composer button:hover:not(:disabled) {
            background: var(--tea-deeper);
            transform: translateY(-1px);
        }

        .chat-panel__composer button:disabled,
        .chat-panel__composer textarea:disabled {
            opacity: 0.68;
            cursor: not-allowed;
        }

        @media (max-width: 980px) {
            .chat-panel__composer {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="../index.html">智教诗途<span class="brand-dot">.</span></a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">首页</a>

                <a href="analysis.html" class="nav-link">朗读分析</a>
                <a href="atlas.html" class="nav-link">文化地图</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="container home-main">
        <section class="hero-shell">
            <div class="hero" style="align-items: stretch; grid-template-columns: 320px 1fr;">
                <div style="display:flex;flex-direction:column;justify-content:center;">
                    <span class="page-header-tag">TAIBAI ASSISTANT</span>
                    <h1 class="page-header-title" style="font-size: 2.8rem;">智能辅导页</h1>
                    <p class="page-header-desc" style="font-size:1rem;color:#6f6256;">像一位在书桌旁落座的助教，回答你的文本与课堂问题。</p>
                    
                    <div style="margin-top:36px;padding-top:32px;border-top:1px solid rgba(232,222,210,0.6);">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="width:40px;height:40px;border-radius:50%;background:var(--paper-soft);border:1px solid #d7c7b7;display:flex;align-items:center;justify-content:center;color:var(--text);font-family:var(--font-serif);font-size:16px;">白</div>
                            <div>
                                <div style="font-weight:500;color:var(--tea-deep);">太白</div>
                                <div style="font-size:12px;color:var(--text-mute);">在线 · 教学与朗读支持</div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px;font-size:13px;color:#6f6256;">
                        <div style="display:flex;align-items:flex-start;gap:8px;"><span style="color:var(--tea);margin-top:2px;">•</span>推荐适合学段的作品</div>
                        <div style="display:flex;align-items:flex-start;gap:8px;"><span style="color:var(--tea);margin-top:2px;">•</span>提供朗读停连与情感建议</div>
                        <div style="display:flex;align-items:flex-start;gap:8px;"><span style="color:var(--tea);margin-top:2px;">•</span>生成课堂导入与活动思路</div>
                    </div>
                </div>

                <div class="hero-panel-wrap">
                    <div class="hero-glow"></div>
                    <section class="assistant-panel hero-panel" style="padding:0;display:flex;flex-direction:column;height:680px;background:rgba(255,255,255,0.85);">
                        <div id="difyChatApp" class="dify-chat-root"></div>

                </div>
            </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-panel">
                <p class="eyebrow">ASK, EXPLORE, GUIDE</p>

                <p class="footer-desc">智能助手页保留独立分页，但整体体验从“聊天产品”调整为“教学与朗读辅导空间”，让功能更贴近教师与审美型学习者的心理预期。</p>
                <div class="footer-actions">

    <script>
        window.addEventListener('scroll', function () {
            var navbar = document.getElementById('navbar');
            if (window.scrollY > 8) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        document.getElementById('navToggle').addEventListener('click', function () {
            document.getElementById('navMenu').classList.toggle('open');
        });
    </script>
