<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料库 - 智教诗途</title>
    <meta name="description" content="智教诗途臻选序列库。精选古诗词、现代诗歌与散文，为创意工作者的朗读修炼提供极致素材。">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- Filter Bar --- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 64px;
        }
        .filter-btn {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            padding: 10px 24px;
            border-radius: var(--radius-full);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            background: transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .filter-btn:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--color-white);
        }
        .filter-btn.active {
            border-color: var(--color-electric);
            color: var(--color-electric);
            background: rgba(0,240,255,0.05);
        }

        /* --- Material Cards Grid --- */
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .material-card {
            background: var(--color-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 36px 32px;
            transition: all var(--transition-normal);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }
        .material-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--color-electric), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .material-card:hover {
            background: var(--color-card-hover);
            border-color: var(--color-border-hover);
            transform: translateY(-6px);
            box-shadow: 0 24px 48px -12px rgba(0, 240, 255, 0.06);
        }
        .material-card:hover::before {
            opacity: 1;
        }

        .material-category-tag {
            font-family: var(--font-sans);
            font-size: 0.55rem;
            letter-spacing: var(--tracking-widest);
            text-transform: uppercase;
            color: var(--color-electric);
            font-weight: 600;
        }

        .material-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .material-author {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .material-excerpt {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .material-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .material-difficulty {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            color: var(--color-text-secondary);
            letter-spacing: 0.05em;
        }

        .material-difficulty .star {
            color: var(--color-electric);
        }
        .material-difficulty .star-empty {
            color: rgba(255,255,255,0.1);
        }

        .material-action {
            font-size: 0.65rem;
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            color: var(--color-white);
            transition: color var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .material-action:hover {
            color: var(--color-electric);
        }

        /* --- External Links --- */
        .external-links {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 64px;
        }

        .external-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: var(--tracking-wide);
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
        }
        .external-link:hover {
            border-color: var(--color-electric-dim);
            color: var(--color-electric);
            box-shadow: 0 0 20px rgba(0,240,255,0.08);
        }
        .external-link svg {
            width: 14px; height: 14px;
            opacity: 0.5;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 48px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 1.5rem;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: color var(--transition-fast);
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: var(--color-electric);
        }
        .modal-tag {
            font-size: 0.55rem;
            letter-spacing: var(--tracking-widest);
            text-transform: uppercase;
            color: var(--color-electric);
            font-weight: 600;
            margin-bottom: 16px;
            display: block;
        }
        .modal-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 8px;
        }
        .modal-author {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-bottom: 32px;
        }
        .modal-content-text {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            line-height: 2;
            white-space: pre-line;
        }
        .modal-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--color-text-secondary);
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .materials-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="../index.html">智教诗途<span class="brand-dot">.</span></a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="materials.html" class="nav-link active">资料库</a>
                <a href="chat.html" class="nav-link">智能助手</a>
                <a href="analysis.html" class="nav-link">朗读分析</a>
                <a href="atlas.html" class="nav-link">地图册</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="document.getElementById('navMenu').classList.toggle('open')">
                <span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="page-header section-border" style="padding-bottom:80px;">
        <div class="ambient-glow" style="top:-20%; right:-10%; width:40vw; height:40vw; opacity:0.3;"></div>
        <div class="container" style="position:relative; z-index:1;">
            <span class="page-header-tag fade-up">Curated Archives</span>
            <h1 class="page-header-title fade-up delay-100">臻选序列库</h1>
            <p class="page-header-desc fade-up delay-200">精选朗读材料，分类清晰，涵盖古典诗词、现代诗歌与散文，为极致表达者准备。</p>
        </div>
    </header>

    <!-- 主要内容 -->
    <main style="padding:80px 0;">
        <div class="container">

            <!-- 外部资源链接 -->
            <div class="external-links fade-up">
                <a href="https://www.gushiwen.cn/" target="_blank" class="external-link">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    古诗文网 · 经典传承
                </a>
                <a href="https://pan.baidu.com/s/1n5H8RiCmiExSNxYBgpszTg?pwd=QfgJ" target="_blank" class="external-link">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    朗诵技巧 · 资料库
                </a>
            </div>

            <!-- 筛选按钮 -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="poetry">古诗词</button>
                <button class="filter-btn" data-category="modern">现代诗</button>
                <button class="filter-btn" data-category="prose">散文</button>
            </div>

            <!-- 材料网格 -->
            <div class="materials-grid" id="materialsGrid"></div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-state-icon">📚</div>
                <p>暂无相关资料</p>
            </div>
        </div>
    </main>

    <!-- 材料详情模态框 -->
    <div class="modal-overlay" id="materialModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMaterialModal()">&times;</button>
            <span class="modal-tag" id="modalTag"></span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-author" id="modalAuthor"></p>
            <div class="modal-content-text" id="modalContent"></div>
            <div class="modal-footer">
                <a href="analysis.html" class="btn-solid" style="padding:12px 32px;">开始练习</a>
                <button class="btn-ghost" onclick="closeMaterialModal()" style="padding:12px 32px;">关闭</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" style="padding-top:80px;">
        <div class="footer-glow"></div>
        <div class="container-wide">
            <div class="footer-bottom">
                <div class="footer-links">
                    <a href="../index.html">Home</a>
                    <a href="chat.html">AI Dialogue</a>
                    <a href="analysis.html">Analysis</a>
                </div>
                <div class="footer-brand-text">智教诗途 © 2026</div>
            </div>
        </div>
    </footer>

    <script>
    // Navbar scroll
    window.addEventListener('scroll', function() {
        var navbar = document.getElementById('navbar');
        if (window.scrollY > 60) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });

    // Material data
    var materialsData = [
        { id: 1, title: "静夜思", author: "李白", category: "poetry", difficulty: 2,
          excerpt: "床前明月光，疑是地上霜。举头望明月，低头思故乡。",
          content: "床前明月光，疑是地上霜。\n举头望明月，低头思故乡。\n\n朗读要点：\n1. 开头语气宜安静清澈，带出夜色与月色\n2. \"举头\"与\"低头\"形成动作对照，停顿要清楚\n3. 末句收束要轻一些，把思乡的余韵留下来" },
        { id: 2, title: "早发白帝城", author: "李白", category: "poetry", difficulty: 3,
          excerpt: "朝辞白帝彩云间，千里江陵一日还。两岸猿声啼不住，轻舟已过万重山。",
          content: "朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。\n\n朗读要点：\n1. 前两句节奏要明快，读出出发时的开阔和畅快\n2. \"千里\"与\"一日\"要形成速度感的对比\n3. 结尾要有一气呵成的轻盈感，突出诗人豪兴" },
        { id: 3, title: "望庐山瀑布", author: "李白", category: "poetry", difficulty: 2,
          excerpt: "日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。",
          content: "日照香炉生紫烟，遥看瀑布挂前川。\n飞流直下三千尺，疑是银河落九天。\n\n朗读要点：\n1. 前两句语速可稍缓，先铺开画面\n2. \"飞流直下三千尺\"要读出力量与纵深\n3. 末句想象夸张，音色可以更明亮、更昂扬" },
        { id: 4, title: "黄鹤楼送孟浩然之广陵", author: "李白", category: "poetry", difficulty: 4,
          excerpt: "故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。",
          content: "故人西辞黄鹤楼，烟花三月下扬州。\n孤帆远影碧空尽，唯见长江天际流。\n\n朗读要点：\n1. 前两句要读出春日送别的明丽气息\n2. \"孤帆远影\"要放慢一些，留出目送远去的空间\n3. 最后一句语气宜舒展悠长，把离情融进江水中" },
        { id: 5, title: "独坐敬亭山", author: "李白", category: "poetry", difficulty: 3,
          excerpt: "众鸟高飞尽，孤云独去闲。相看两不厌，只有敬亭山。",
          content: "众鸟高飞尽，孤云独去闲。\n相看两不厌，只有敬亭山。\n\n朗读要点：\n1. 起句要有空旷感，读出万物渐静的层次\n2. \"孤云独去闲\"不宜太快，保留闲适与孤寂\n3. 末句语调平稳，突出人与山相对的静观意味" },
        { id: 6, title: "月下独酌", author: "李白", category: "poetry", difficulty: 4,
          excerpt: "花间一壶酒，独酌无相亲。举杯邀明月，对影成三人。",
          content: "花间一壶酒，独酌无相亲。\n举杯邀明月，对影成三人。\n\n朗读要点：\n1. 第一联要读出夜饮独酌的清冷感\n2. \"邀明月\"与\"成三人\"要带一点浪漫想象的抬升\n3. 整体语气可在孤独与旷达之间保持张力" }
    ];

    var currentCategory = 'all';
    var categoryNames = { poetry: '古诗词', modern: '现代诗', prose: '散文' };

    function renderMaterials() {
        var grid = document.getElementById('materialsGrid');
        var empty = document.getElementById('emptyState');
        var filtered = currentCategory === 'all' ? materialsData : materialsData.filter(function(m) { return m.category === currentCategory; });

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = filtered.map(function(m) {
            var stars = '';
            for (var i = 1; i <= 5; i++) {
                stars += i <= m.difficulty ? '<span class="star">★</span>' : '<span class="star-empty">★</span>';
            }
            return '<div class="material-card" onclick="openMaterial(' + m.id + ')">' +
                '<span class="material-category-tag">' + (categoryNames[m.category] || m.category) + '</span>' +
                '<h3 class="material-title">' + m.title + '</h3>' +
                '<p class="material-author">' + m.author + '</p>' +
                '<p class="material-excerpt">' + m.excerpt + '</p>' +
                '<div class="material-meta">' +
                    '<span class="material-difficulty">' + stars + '</span>' +
                    '<span class="material-action">详情 <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    // Filter logic
    document.getElementById('filterBar').addEventListener('click', function(e) {
        if (e.target.classList.contains('filter-btn')) {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            e.target.classList.add('active');
            currentCategory = e.target.dataset.category;
            renderMaterials();
        }
    });

    // Modal
    function openMaterial(id) {
        var m = materialsData.find(function(item) { return item.id === id; });
        if (!m) return;
        document.getElementById('modalTag').textContent = categoryNames[m.category] || m.category;
        document.getElementById('modalTitle').textContent = m.title;
        document.getElementById('modalAuthor').textContent = '作者：' + m.author;
        document.getElementById('modalContent').textContent = m.content;
        document.getElementById('materialModal').classList.add('open');
    }

    function closeMaterialModal() {
        document.getElementById('materialModal').classList.remove('open');
    }

    document.getElementById('materialModal').addEventListener('click', function(e) {
        if (e.target === this) closeMaterialModal();
    });

    // Init
    renderMaterials();
    </script>
</body>
</html>
