<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料库 - 智教诗途</title>
    <meta name="description" content="智教诗途臻选序列库。精选古诗词、现代诗歌与散文，为创意工作者的朗读修炼提供极致素材。">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- Filter Bar --- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 64px;
        }
        .filter-btn {
            font-family: var(--font-sans);
            font-size: 0.65rem;
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            padding: 10px 24px;
            border-radius: var(--radius-full);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            background: transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .filter-btn:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--color-white);
        }
        .filter-btn.active {
            border-color: var(--color-electric);
            color: var(--color-electric);
            background: rgba(0,240,255,0.05);
        }

        /* --- Material Cards Grid --- */
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .material-card {
            background: var(--color-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 36px 32px;
            transition: all var(--transition-normal);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }
        .material-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--color-electric), transparent);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .material-card:hover {
            background: var(--color-card-hover);
            border-color: var(--color-border-hover);
            transform: translateY(-6px);
            box-shadow: 0 24px 48px -12px rgba(0, 240, 255, 0.06);
        }
        .material-card:hover::before {
            opacity: 1;
        }

        .material-category-tag {
            font-family: var(--font-sans);
            font-size: 0.55rem;
            letter-spacing: var(--tracking-widest);
            text-transform: uppercase;
            color: var(--color-electric);
            font-weight: 600;
        }

        .material-title {
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .material-author {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .material-excerpt {
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--color-text-muted);
            line-height: 1.8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .material-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
        }

        .material-difficulty {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            color: var(--color-text-secondary);
            letter-spacing: 0.05em;
        }

        .material-difficulty .star {
            color: var(--color-electric);
        }
        .material-difficulty .star-empty {
            color: rgba(255,255,255,0.1);
        }

        .material-action {
            font-size: 0.65rem;
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
            color: var(--color-white);
            transition: color var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .material-action:hover {
            color: var(--color-electric);
        }

        /* --- External Links --- */
        .external-links {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 64px;
        }

        .external-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-full);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: var(--tracking-wide);
            color: var(--color-text-secondary);
            transition: all var(--transition-fast);
        }
        .external-link:hover {
            border-color: var(--color-electric-dim);
            color: var(--color-electric);
            box-shadow: 0 0 20px rgba(0,240,255,0.08);
        }
        .external-link svg {
            width: 14px; height: 14px;
            opacity: 0.5;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 48px;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 1.5rem;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: color var(--transition-fast);
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: var(--color-electric);
        }
        .modal-tag {
            font-size: 0.55rem;
            letter-spacing: var(--tracking-widest);
            text-transform: uppercase;
            color: var(--color-electric);
            font-weight: 600;
            margin-bottom: 16px;
            display: block;
        }
        .modal-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 8px;
        }
        .modal-author {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-bottom: 32px;
        }
        .modal-content-text {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            line-height: 2;
            white-space: pre-line;
        }
        .modal-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--color-text-secondary);
        }
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .materials-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="../index.html">智教诗途<span class="brand-dot">.</span></a>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="materials.html" class="nav-link active">资料库</a>
                <a href="chat.html" class="nav-link">智能助手</a>
                <a href="analysis.html" class="nav-link">朗读分析</a>
            </div>
            <div class="nav-toggle" id="navToggle" onclick="document.getElementById('navMenu').classList.toggle('open')">
                <span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="page-header section-border" style="padding-bottom:80px;">
        <div class="ambient-glow" style="top:-20%; right:-10%; width:40vw; height:40vw; opacity:0.3;"></div>
        <div class="container" style="position:relative; z-index:1;">
            <span class="page-header-tag fade-up">Curated Archives</span>
            <h1 class="page-header-title fade-up delay-100">臻选序列库</h1>
            <p class="page-header-desc fade-up delay-200">精选朗读材料，分类清晰，涵盖古典诗词、现代诗歌与散文，为极致表达者准备。</p>
        </div>
    </header>

    <!-- 主要内容 -->
    <main style="padding:80px 0;">
        <div class="container">

            <!-- 外部资源链接 -->
            <div class="external-links fade-up">
                <a href="https://www.gushiwen.cn/" target="_blank" class="external-link">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    古诗文网 · 经典传承
                </a>
                <a href="https://pan.baidu.com/s/1n5H8RiCmiExSNxYBgpszTg?pwd=QfgJ" target="_blank" class="external-link">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    朗诵技巧 · 资料库
                </a>
            </div>

            <!-- 筛选按钮 -->
            <div class="filter-bar" id="filterBar">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="poetry">古诗词</button>
                <button class="filter-btn" data-category="modern">现代诗</button>
                <button class="filter-btn" data-category="prose">散文</button>
            </div>

            <!-- 材料网格 -->
            <div class="materials-grid" id="materialsGrid"></div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-state-icon">📚</div>
                <p>暂无相关资料</p>
            </div>
        </div>
    </main>

    <!-- 材料详情模态框 -->
    <div class="modal-overlay" id="materialModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeMaterialModal()">&times;</button>
            <span class="modal-tag" id="modalTag"></span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-author" id="modalAuthor"></p>
            <div class="modal-content-text" id="modalContent"></div>
            <div class="modal-footer">
                <a href="analysis.html" class="btn-solid" style="padding:12px 32px;">开始练习</a>
                <button class="btn-ghost" onclick="closeMaterialModal()" style="padding:12px 32px;">关闭</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" style="padding-top:80px;">
        <div class="footer-glow"></div>
        <div class="container-wide">
            <div class="footer-bottom">
                <div class="footer-links">
                    <a href="../index.html">Home</a>
                    <a href="chat.html">AI Dialogue</a>
                    <a href="analysis.html">Analysis</a>
                </div>
                <div class="footer-brand-text">智教诗途 © 2026</div>
            </div>
        </div>
    </footer>

    <script>
    // Navbar scroll
    window.addEventListener('scroll', function() {
        var navbar = document.getElementById('navbar');
        if (window.scrollY > 60) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });

    // Material data
    var materialsData = [
        { id: 1, title: "静夜思", author: "李白", category: "poetry", difficulty: 2,
          excerpt: "床前明月光，疑是地上霜。举头望明月，低头思故乡。",
          content: "床前明月光，疑是地上霜。\n举头望明月，低头思故乡。\n\n这是李白的代表作之一，表达了诗人对故乡的思念之情。\n\n朗读要点：\n1. 语调要平缓，体现思念的情感\n2. 注意停顿，\"床前明月光\"后稍作停顿\n3. \"举头\"和\"低头\"要有动作感\n4. 最后一句要读出深深的思念" },
        { id: 2, title: "春晓", author: "孟浩然", category: "poetry", difficulty: 1,
          excerpt: "春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。",
          content: "春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少。\n\n这首诗描写了春天早晨的美好景象。\n\n朗读要点：\n1. 语调要轻快活泼，体现春天的生机\n2. \"处处闻啼鸟\"要读出鸟儿的欢快\n3. \"夜来风雨声\"语调稍沉\n4. 最后一句带有疑问和感叹的语气" },
        { id: 3, title: "再别康桥", author: "徐志摩", category: "modern", difficulty: 4,
          excerpt: "轻轻的我走了，正如我轻轻的来；我轻轻的招手，作别西天的云彩。",
          content: "轻轻的我走了，\n正如我轻轻的来；\n我轻轻的招手，\n作别西天的云彩。\n\n那河畔的金柳，\n是夕阳中的新娘；\n波光里的艳影，\n在我的心头荡漾。\n\n朗读要点：\n1. 语调要轻柔，体现\"轻轻\"的感觉\n2. 节奏要舒缓，不要急躁\n3. 注意韵律感，每行的重音要把握好\n4. 情感要真挚，表达出离别的不舍" },
        { id: 4, title: "荷塘月色", author: "朱自清", category: "prose", difficulty: 5,
          excerpt: "这几天心里颇不宁静。今晚在院子里坐着乘凉，忽然想起日日走过的荷塘...",
          content: "这几天心里颇不宁静。今晚在院子里坐着乘凉，忽然想起日日走过的荷塘，在这满月的光里，总该另有一番样子吧。\n\n沿着荷塘，是一条曲折的小煤屑路。\n\n朗读要点：\n1. 语速要舒缓，营造月夜的宁静氛围\n2. 描写景物时要有画面感\n3. 注意长句的停顿和呼吸" },
        { id: 5, title: "望岳", author: "杜甫", category: "poetry", difficulty: 3,
          excerpt: "岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。",
          content: "岱宗夫如何？齐鲁青未了。\n造化钟神秀，阴阳割昏晓。\n荡胸生层云，决眦入归鸟。\n会当凌绝顶，一览众山小。\n\n朗读要点：\n1. 起首设问，语气要有期待感\n2. 中间写景要表现壮观\n3. 最后两句是全诗高潮，要读得慷慨有力" },
        { id: 6, title: "面朝大海，春暖花开", author: "海子", category: "modern", difficulty: 3,
          excerpt: "从明天起，做一个幸福的人。喂马、劈柴，周游世界。",
          content: "从明天起，做一个幸福的人\n喂马、劈柴，周游世界\n从明天起，关心粮食和蔬菜\n我有一所房子，面朝大海，春暖花开\n\n朗读要点：\n1. 前半部分要读出对简单生活的向往\n2. \"面朝大海，春暖花开\"要读出开阔感\n3. 整体语调温暖而略带忧伤" }
    ];

    var currentCategory = 'all';
    var categoryNames = { poetry: '古诗词', modern: '现代诗', prose: '散文' };

    function renderMaterials() {
        var grid = document.getElementById('materialsGrid');
        var empty = document.getElementById('emptyState');
        var filtered = currentCategory === 'all' ? materialsData : materialsData.filter(function(m) { return m.category === currentCategory; });

        if (filtered.length === 0) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        grid.innerHTML = filtered.map(function(m) {
            var stars = '';
            for (var i = 1; i <= 5; i++) {
                stars += i <= m.difficulty ? '<span class="star">★</span>' : '<span class="star-empty">★</span>';
            }
            return '<div class="material-card" onclick="openMaterial(' + m.id + ')">' +
                '<span class="material-category-tag">' + (categoryNames[m.category] || m.category) + '</span>' +
                '<h3 class="material-title">' + m.title + '</h3>' +
                '<p class="material-author">' + m.author + '</p>' +
                '<p class="material-excerpt">' + m.excerpt + '</p>' +
                '<div class="material-meta">' +
                    '<span class="material-difficulty">' + stars + '</span>' +
                    '<span class="material-action">详情 <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    // Filter logic
    document.getElementById('filterBar').addEventListener('click', function(e) {
        if (e.target.classList.contains('filter-btn')) {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            e.target.classList.add('active');
            currentCategory = e.target.dataset.category;
            renderMaterials();
        }
    });

    // Modal
    function openMaterial(id) {
        var m = materialsData.find(function(item) { return item.id === id; });
        if (!m) return;
        document.getElementById('modalTag').textContent = categoryNames[m.category] || m.category;
        document.getElementById('modalTitle').textContent = m.title;
        document.getElementById('modalAuthor').textContent = '作者：' + m.author;
        document.getElementById('modalContent').textContent = m.content;
        document.getElementById('materialModal').classList.add('open');
    }

    function closeMaterialModal() {
        document.getElementById('materialModal').classList.remove('open');
    }

    document.getElementById('materialModal').addEventListener('click', function(e) {
        if (e.target === this) closeMaterialModal();
    });

    // Init
    renderMaterials();
    </script>
</body>
</html>
